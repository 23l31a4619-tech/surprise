<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise ❤️</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- =========================
         WELCOME PAGE
    ========================== -->

    <section id="welcomePage" class="page active">

        <div class="welcome-content">

            <h1>Ready for Surprise? ✨</h1>

            <button id="startBtn">
                Yes 💖
            </button>

        </div>

    </section>



    <!-- =========================
         PHOTO BOOK
    ========================== -->

    <section id="bookSection" class="hidden">

        <div id="book">

            <!-- Photo 1 -->
            <div class="photo-page active">
                <img src="1.png" alt="Photo 1">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 2 -->
            <div class="photo-page">
                <img src="2.png" alt="Photo 2">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 3 -->
            <div class="photo-page">
                <img src="3.jpeg" alt="Photo 3">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 4 -->
            <div class="photo-page">
                <img src="4.png" alt="Photo 4">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 5 -->
            <div class="photo-page">
                <img src="5.png" alt="Photo 5">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 6 -->
            <div class="photo-page">
                <img src="6.png" alt="Photo 6">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 7 -->
            <div class="photo-page">
                <img src="7.png" alt="Photo 7">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 8 -->
            <div class="photo-page">
                <img src="8.png" alt="Photo 8">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 9 -->
            <div class="photo-page">
                <img src="9.png" alt="Photo 9">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 10 -->
            <div class="photo-page">
                <img src="10.png" alt="Photo 10">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 11 -->
            <div class="photo-page">
                <img src="11.png" alt="Photo 11">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 12 -->
            <div class="photo-page">
                <img src="12.jpeg" alt="Photo 12">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 13 -->
            <div class="photo-page">
                <img src="13.png" alt="Photo 13">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 14 -->
            <div class="photo-page">
                <img src="14.jpg" alt="Photo 14">
                <button class="next-btn">Next ➜</button>
            </div>

            <!-- Photo 15 -->
            <div class="photo-page">
                <img src="15.jpeg" alt="Photo 15">
                <button class="next-btn">Next ➜</button>
            </div>



            <!-- Photo 16 -->
            <div class="photo-page">
                <img src="16.png" alt="Photo 16">
                <button id="finishBtn">
                    Finish ❤️
                </button>
            </div>

        </div>

    </section>



    <!-- =========================
         FINAL PAGE
    ========================== -->

    <section id="finalPage" class="hidden">

        <div class="final-content">

            <h1>🎉 Happiest Birthday 🎉</h1>

            <h2>Mounicaa 🧿🦋🌷💖</h2>

            <p>
                Wishing you endless happiness, beautiful memories,
                laughter, success, and all the love in the world.
                May your smile always shine as brightly as today.
                ❤️
            </p>

        </div>

    </section>

    
    <script src="script.js"></script>

</body>
</html>
